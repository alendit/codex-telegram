# primary = true

[defaults]
# profile = "operator"

[defaults.default_project]
connection = "primary"
root_path = "/agent"
label = "agent"

# Optional per-chat profile defaults. Keep real chat ids in private config.
# [client_default_profiles]
# "chat:123456789" = "tmpwrite"

# Optional per-chat project allowlists. Keep real chat ids in private config.
# [client_allowed_projects]
# "chat:123456789" = [
#   { connection = "primary", root_path = "/agent" },
# ]

[profiles.readonly]
model = "gpt-5.4"
# model_provider = "openai"
# approval_policy = "never"
# sandbox_type = "readOnly"
# network_access = false
# writable_roots = []
effort = "low"
fast_mode = true
# summary = "concise"
verbosity = "none"
# command_verbosity = "errors"
# followup_mode = "steer"
developer_instructions = "Keep replies concise and do not modify files."

[profiles.tmpwrite]
model = "gpt-5.4"
# model_provider = "openai"
# approval_policy = "never"
sandbox_type = "workspaceWrite"
network_access = true
writable_roots = ["/tmp"]
effort = "low"
# fast_mode = false
# summary = "concise"
verbosity = "none"
# command_verbosity = "errors"
# followup_mode = "steer"
developer_instructions = "Use /tmp for scratch work and keep the workspace itself read-only."

[profiles.operator]
model = "gpt-5.4"
# model_provider = "openai"
approval_policy = "on-request"
sandbox_type = "workspaceWrite"
network_access = true
# writable_roots = []
# effort = "medium"
# fast_mode = false
# summary = "concise"
# verbosity = "verbose"
command_verbosity = "verbose"
# followup_mode = "steer"

[profiles.config_editor]
model = "gpt-5.4"
# model_provider = "openai"
approval_policy = "on-request"
sandbox_type = "workspaceWrite"
# network_access = false
# writable_roots = []
# effort = "medium"
# fast_mode = false
# summary = "concise"
# verbosity = "verbose"
command_verbosity = "verbose"
# followup_mode = "steer"
developer_instructions = "Treat this thread as a careful configuration editor. Prefer minimal edits and explain risky changes."
